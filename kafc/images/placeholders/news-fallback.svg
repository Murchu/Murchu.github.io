  <circle cx="400" cy="202" r="88" fill="none" stroke="#fff" stroke-width="8"/>
  <text x="400" y="222" fill="#fff" font-family="Arial, sans-serif" font-size="58" font-weight="800" text-anchor="middle">KA</text>
  <text x="400" y="338" fill="#fff" font-family="Arial, sans-serif" font-size="25" font-weight="700" letter-spacing="3" text-anchor="middle">KILLARNEY ATHLETIC AFC</text>
