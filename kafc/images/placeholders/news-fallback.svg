<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Killarney Athletic AFC</title>
  <desc id="desc">Blue Killarney Athletic news placeholder</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#071a3d"/>
      <stop offset="1" stop-color="#1764c0"/>
    </linearGradient>
    <pattern id="lines" width="52" height="52" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <path d="M0 0v52" stroke="#fff" stroke-opacity=".07" stroke-width="18"/>
